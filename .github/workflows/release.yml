name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build hub + client
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          EXT=""
          [ "${{ matrix.goos }}" = "windows" ] && EXT=".exe"

          CGO_ENABLED=0 go build -ldflags="-s -w" -o "tunnel-hub-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}" .
          CGO_ENABLED=0 go build -ldflags="-s -w" -o "tunnel-client-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}" ./cmd/tunnel-client

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            tunnel-hub-${{ matrix.goos }}-${{ matrix.goarch }}*
            tunnel-client-${{ matrix.goos }}-${{ matrix.goarch }}*
          retention-days: 1

  create-release:
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
